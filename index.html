<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dijital Flipbook</title>
    
    <!-- Tailwind CSS (Tasarım ve Düzen için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            magenta: '#f70059',
                            orange: '#ff4d15'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Mobilde Kaydırma ve Siyah Boşluk Sorununu Çözen Ayarlar */
        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh; /* Mobil dinamik ekran yüksekliği */
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            position: fixed; /* Ekranı kilitler, kaymayı engeller */
            top: 0;
            left: 0;
            overscroll-behavior: none; /* Mobildeki sekmeyi (pull-to-refresh) engeller */
            background-color: #f70059; /* Altta siyah boşluk görünmesini engeller */
        }

        /* Daha Canlı ve Temiz Gradyan Arkaplan */
        .bg-campaign {
            background-color: #f70059; 
            /* Magenta'dan Turuncuya şık ve temiz bir geçiş */
            background-image: linear-gradient(135deg, #f70059 0%, #ff4d15 100%);
            background-attachment: fixed;
        }

        /* Kitap ve Sayfa Stilleri */
        .flipbook {
            display: none; /* Yüklenene kadar gizli */
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }
        
        .page {
            background-color: #ffffff;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* Cilt (Kitap Ortası) Gölgelendirmesi */
        .page.--left {
            border-right: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.08);
        }
        .page.--right {
            border-left: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.08);
        }

        .page canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Sayfayı tam sığdır */
        }

        /* Özel Scrollbar (Sidebar için) */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4); 
            border-radius: 10px;
        }

        /* Yükleme Animasyonu */
        .loader {
            border: 5px solid rgba(255,255,255,0.3);
            border-bottom-color: #ffffff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* HedefAVM Filigranı */
        .watermark {
            position: fixed;
            bottom: -20px;
            right: 20px;
            font-size: clamp(5rem, 10vw, 10rem);
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.15); /* Şeffaflık ayarlandı */
            z-index: 0;
            pointer-events: none;
            letter-spacing: -3px;
        }

        /* Zoom Slider Rengi */
        input[type=range] {
            accent-color: #ffffff;
        }
    </style>
</head>
<body class="flex flex-col font-sans text-gray-800 bg-campaign relative w-full h-full">

    <!-- Üst Header -->
    <header class="bg-black bg-opacity-20 text-white p-3 flex justify-between items-center shadow-md z-20 absolute top-0 left-0 right-0 backdrop-blur-sm border-b border-white border-opacity-10">
        <div class="font-semibold text-lg tracking-wide flex items-center gap-4" id="book-title">
            <span class="flex items-center gap-2 text-sm sm:text-base"><i class="fas fa-heart text-white opacity-80"></i> Fırsat Kataloğu <i class="fas fa-fire text-white opacity-80"></i></span>
            <div class="bg-black bg-opacity-30 px-3 py-1 rounded-full text-xs sm:text-sm whitespace-nowrap border border-white border-opacity-10">
                Sayfa <span id="current-page">0</span> / <span id="total-pages">0</span>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <a href="https://instagram.com/hedefavm" target="_blank" class="bg-black bg-opacity-30 hover:bg-opacity-50 transition px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-semibold flex items-center gap-2 shadow-sm border border-white border-opacity-10">
                <i class="fab fa-instagram text-white opacity-90 text-base"></i> <span class="hidden sm:inline">İnstagram</span>
            </a>
        </div>
    </header>

    <!-- Küçük Resimler (Sidebar) -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 sm:w-80 bg-gradient-to-b from-brand-magenta to-brand-orange shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col border-r border-white border-opacity-10">
        <div class="p-4 flex justify-between items-center text-white border-b border-white border-opacity-20 bg-black bg-opacity-10 mt-14 sm:mt-16">
            <h2 class="font-bold text-lg"><i class="fas fa-th-large mr-2"></i> Küçük Resimler</h2>
            <button id="btn-close-sidebar" class="hover:text-gray-200 transition p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="thumbnails-container" class="p-4 overflow-y-auto flex-1 grid grid-cols-2 gap-4 auto-rows-max">
            <!-- Thumbnails JS ile buraya yüklenecek -->
        </div>
    </div>

    <!-- Ana İçerik Alanı (Katalog Gövdesi) -->
    <!-- TITREME VE KAYDIRMA SORUNUNU ÇÖZMEK İÇİN OVERFLOW-HIDDEN YAPILDI -->
    <main class="flex-1 relative flex items-center justify-center overflow-hidden w-full h-full pt-20 pb-28 px-4 sm:px-10" id="main-container">
        
        <!-- Arkaplan Yazısı -->
        <div class="watermark">HedefAVM</div>

        <!-- Yükleniyor Ekranı -->
        <div id="loading-screen" class="absolute inset-0 bg-gradient-to-br from-brand-magenta to-brand-orange flex flex-col items-center justify-center z-30 text-white backdrop-blur-sm">
            <div class="loader mb-6" id="loader-spinner"></div>
            <p class="font-bold text-xl sm:text-2xl text-center px-4 tracking-wide" id="loading-text">Katalog Hazırlanıyor...</p>
            <p class="text-sm opacity-90 mt-2 text-center px-4 font-light" id="loading-subtext">Lütfen bekleyin</p>
        </div>

        <!-- Kitap Sarıcı (Boyut Sınırlandırması İçin) -->
        <div id="flipbook-wrapper" class="w-full max-w-5xl h-[70vh] max-h-[850px] origin-center z-10 flex justify-center items-center relative">
            <div id="flipbook" class="flipbook w-full h-full">
                <!-- Sayfalar JS tarafından buraya eklenecek -->
            </div>
            <!-- Zoom Panning Overlay -->
            <div id="zoom-overlay" class="hidden absolute inset-0 z-50 cursor-grab"></div>
        </div>

    </main>

    <!-- Zoom Kontrol Paneli -->
    <div id="zoom-control" class="hidden absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-60 backdrop-blur-md rounded-full px-6 py-3 items-center gap-4 z-40 shadow-xl border border-white border-opacity-20">
        <i class="fas fa-search-minus text-white text-sm"></i>
        <input type="range" id="zoom-slider" min="0.5" max="3" step="0.1" value="1" class="w-32 sm:w-48 cursor-pointer">
        <i class="fas fa-search-plus text-white text-sm"></i>
        <div class="w-px h-6 bg-white opacity-30 mx-2"></div>
        <span id="zoom-val-text" class="text-white font-mono text-sm w-10">100%</span>
        <button id="btn-close-zoom" class="text-white opacity-70 hover:opacity-100 ml-2 transition"><i class="fas fa-times"></i></button>
    </div>

    <!-- Alt Araç Çubuğu -->
    <footer class="absolute bottom-4 sm:bottom-6 left-1/2 transform -translate-x-1/2 bg-black bg-opacity-40 backdrop-blur-md rounded-full p-2 sm:p-3 shadow-xl z-20 flex justify-between items-center px-4 sm:px-8 w-[95%] max-w-3xl border border-white border-opacity-10">
        
        <!-- Sol İkonlar -->
        <div class="flex gap-3 sm:gap-6 text-white opacity-90 mr-2 sm:mr-6">
            <button id="btn-thumbnails" class="hover:text-gray-300 transition transform hover:scale-110" title="Küçük Resimler"><i class="fas fa-th-large text-lg"></i></button>
            <button class="hover:text-gray-300 transition transform hover:scale-110" title="İçindekiler"><i class="fas fa-list text-lg"></i></button>
        </div>

        <!-- Sayfa Kontrolleri (Orta) -->
        <div class="flex gap-4 sm:gap-8 items-center border-l border-r border-white border-opacity-20 px-4 sm:px-8">
            <button id="btn-prev" class="text-white hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed transition text-xl sm:text-2xl" disabled>
                <i class="fas fa-chevron-left"></i>
            </button>
            <button id="btn-next" class="text-white hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed transition text-xl sm:text-2xl" disabled>
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Sağ İkonlar -->
        <div class="flex gap-3 sm:gap-6 text-white opacity-90 ml-2 sm:ml-6">
            <button id="btn-zoom" class="hover:text-gray-300 transition transform hover:scale-110" title="Yakınlaştır"><i class="fas fa-search-plus text-lg"></i></button>
            <button id="btn-share" class="hover:text-gray-300 transition transform hover:scale-110" title="Paylaş"><i class="fas fa-share-alt text-lg"></i></button>
            <button id="btn-download" class="hover:text-gray-300 transition transform hover:scale-110" title="İndir"><i class="fas fa-download text-lg"></i></button>
            <button id="btn-fullscreen" class="hover:text-gray-300 transition transform hover:scale-110 hidden sm:block" title="Tam Ekran"><i class="fas fa-expand text-lg"></i></button>
        </div>
    </footer>

    <!-- Gerekli Kütüphaneler (PDF.js ve PageFlip.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        // PDF.js Worker Tanımlaması
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        /* * STREAMLIT İÇİN ÖZEL YAPILANDIRMA:
         * Python (Streamlit) kodu, bu "dugunpaketi2026.pdf" metnini otomatik olarak 
         * kendi oluşturacağı "Base64 PDF Verisi" ile değiştirecek ve çalıştıracaktır.
         */
        let DEFAULT_PDF_URL = 'dugunpaketi2026.pdf'; 

        // Değişkenler
        let pageFlipObj = null;
        let pdfDoc = null;

        // Panning Değişkenleri
        let currentScale = 1;
        let translateX = 0;
        let translateY = 0;
        let isPanning = false;
        let startX = 0, startY = 0;

        // DOM Elementleri
        const loadingScreen = document.getElementById('loading-screen');
        const flipbookEl = document.getElementById('flipbook');
        const flipbookWrapper = document.getElementById('flipbook-wrapper');
        const mainContainer = document.getElementById('main-container');
        const currentPageEl = document.getElementById('current-page');
        const totalPagesEl = document.getElementById('total-pages');
        const zoomOverlay = document.getElementById('zoom-overlay');
        const loaderSpinner = document.getElementById('loader-spinner');
        const loadingSubtext = document.getElementById('loading-subtext');
        
        // Butonlar
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const btnThumbnails = document.getElementById('btn-thumbnails');
        const btnCloseSidebar = document.getElementById('btn-close-sidebar');
        const sidebar = document.getElementById('sidebar');
        const thumbnailsContainer = document.getElementById('thumbnails-container');
        const btnShare = document.getElementById('btn-share');
        const btnDownload = document.getElementById('btn-download');
        
        // Zoom Elemanları
        const btnZoom = document.getElementById('btn-zoom');
        const zoomControl = document.getElementById('zoom-control');
        const zoomSlider = document.getElementById('zoom-slider');
        const btnCloseZoom = document.getElementById('btn-close-zoom');
        const zoomValText = document.getElementById('zoom-val-text');

        // Otomatik başlat
        window.addEventListener('DOMContentLoaded', () => {
            if (DEFAULT_PDF_URL) {
                loadPdfFromUrl(DEFAULT_PDF_URL);
            }
        });

        async function loadPdfFromUrl(url) {
            loadingScreen.classList.remove('hidden');
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                await processPdf(pdf);
            } catch (error) {
                console.error("PDF Yükleme hatası:", error);
                
                // Sadeleştirilmiş Hata Mesajı
                loaderSpinner.style.display = 'none';
                document.getElementById('loading-text').innerHTML = `
                    <i class="fas fa-exclamation-triangle text-white text-4xl mb-4 block opacity-80"></i>
                    Katalog Bulunamadı!
                `;
                loadingSubtext.innerHTML = `
                    <div class="bg-black bg-opacity-20 p-4 sm:p-6 rounded-xl mt-4 text-center text-sm max-w-lg mx-auto border border-white border-opacity-10 shadow-lg">
                        <p class="mb-2 text-white text-base">Dosya yüklenirken veya Streamlit üzerinden okunurken bir sorun oluştu.</p>
                        <p class="text-white opacity-70 text-sm">Python terminalindeki hata kayıtlarını kontrol edin.</p>
                    </div>
                `;
            }
        }

        async function processPdf(pdf) {
            pdfDoc = pdf;
            const numPages = pdf.numPages;
            totalPagesEl.textContent = numPages;
            flipbookEl.innerHTML = ''; 
            thumbnailsContainer.innerHTML = ''; // Önceki küçük resimleri temizle

            // 1. Sayfadan boyut tespiti
            const firstPage = await pdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1.5 });
            const baseWidth = viewport.width;
            const baseHeight = viewport.height;

            // Sayfaları render et ve küçük resimleri oluştur
            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                document.getElementById('loading-text').textContent = `Sayfalar işleniyor (${pageNum}/${numPages})...`;
                
                const page = await pdf.getPage(pageNum);
                const pageViewport = page.getViewport({ scale: 1.5 });
                
                // --- KİTAP SAYFASI ---
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                canvas.width = pageViewport.width;
                canvas.height = pageViewport.height;

                await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                pageDiv.appendChild(canvas);
                flipbookEl.appendChild(pageDiv);

                // --- KÜÇÜK RESİM (THUMBNAIL) OLUŞTURMA ---
                const thumbDiv = document.createElement('div');
                thumbDiv.className = "flex flex-col items-center gap-1 cursor-pointer group";
                
                const thumbImg = document.createElement('img');
                // Canvas'ı resme çeviriyoruz (kalite 0.5 ile performansı artırır)
                thumbImg.src = canvas.toDataURL('image/jpeg', 0.5); 
                thumbImg.className = "w-full shadow-md border-2 border-transparent group-hover:border-white transition-all rounded-sm object-contain bg-white h-32";
                
                const thumbLabel = document.createElement('span');
                thumbLabel.className = "text-white text-xs font-semibold opacity-80 group-hover:opacity-100";
                thumbLabel.textContent = `Sayfa ${pageNum}`;

                thumbDiv.appendChild(thumbImg);
                thumbDiv.appendChild(thumbLabel);
                
                // Küçük resme tıklayınca o sayfaya git
                thumbDiv.onclick = () => {
                    if (pageFlipObj) {
                        pageFlipObj.turnToPage(pageNum - 1); 
                        sidebar.classList.add('-translate-x-full'); // Menüyü kapat
                    }
                };
                thumbnailsContainer.appendChild(thumbDiv);
            }

            // Kitabı Başlat
            initPageFlip(baseWidth, baseHeight);
            
            loadingScreen.classList.add('hidden');
            flipbookEl.style.display = 'block';
            currentPageEl.textContent = '1';
            btnNext.disabled = false;
        }

        function initPageFlip(width, height) {
            if (pageFlipObj) pageFlipObj.destroy();

            pageFlipObj = new St.PageFlip(flipbookEl, {
                width: width, 
                height: height, 
                size: "stretch", // Wrapper sınırlarına göre esneklik sağlar
                minWidth: 300,
                maxWidth: 2000,
                minHeight: 400,
                maxHeight: 2500,
                maxShadowOpacity: 0.6,
                showCover: true, 
                mobileScrollSupport: true,
                usePortrait: true 
            });

            pageFlipObj.loadFromHTML(document.querySelectorAll('.page'));

            pageFlipObj.on('flip', (e) => {
                let currentPage = e.data + 1;
                currentPageEl.textContent = currentPage;
                btnPrev.disabled = (currentPage === 1);
                btnNext.disabled = (currentPage >= pdfDoc.numPages);
            });
        }

        // --- ARAÇ ÇUBUĞU ETKİLEŞİMLERİ ---

        btnPrev.addEventListener('click', () => { if (pageFlipObj) pageFlipObj.flipPrev(); });
        btnNext.addEventListener('click', () => { if (pageFlipObj) pageFlipObj.flipNext(); });

        // Sidebar (Küçük Resimler) Kontrolleri
        btnThumbnails.addEventListener('click', () => sidebar.classList.remove('-translate-x-full'));
        btnCloseSidebar.addEventListener('click', () => sidebar.classList.add('-translate-x-full'));

        // Paylaşım İşlevi (Streamlit Güvenli Mod)
        btnShare.addEventListener('click', () => {
            // Streamlit iframe'i içinde olduğumuz için uygulamanın kök URL'sini veya varsayılanı alıyoruz
            let shareUrl = "https://instagram.com/hedefavm";
            try { shareUrl = window.top.location.href || shareUrl; } catch(e) {}

            // Eski tarayıcılar ve iframe'ler için güvenli pano kopyalama
            const tempInput = document.createElement('input');
            tempInput.value = shareUrl;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                alert("Katalog linki panoya kopyalandı!\n" + shareUrl);
            } catch (err) {
                alert("Tarayıcınız kopyalama işlemini desteklemiyor.");
            }
            document.body.removeChild(tempInput);
        });

        // PDF İndirme İşlevi (Streamlit Uyumlu)
        btnDownload.addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = DEFAULT_PDF_URL; // Base64 verisi üzerinden direkt indirir
            a.download = "HedefAVM_Firsat_Katalogu.pdf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // Tam Ekran (Streamlit iframe izinlerine tabidir)
        btnFullscreen.addEventListener('click', () => {
            const doc = window.document.documentElement;
            if (!document.fullscreenElement) {
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
                else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
                else alert("Tam ekran modu Streamlit tarafından engellenmiş olabilir.");
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        });

        // --- ZOOM (YAKINLAŞTIRMA) İŞLEVLERİ ---
        
        btnZoom.addEventListener('click', () => {
            zoomControl.classList.remove('hidden');
            zoomControl.classList.add('flex');
        });

        btnCloseZoom.addEventListener('click', () => {
            zoomControl.classList.add('hidden');
            zoomControl.classList.remove('flex');
            resetZoom();
        });

        function applyZoomTransform() {
            flipbookWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function resetZoom() {
            zoomSlider.value = 1;
            currentScale = 1;
            translateX = 0;
            translateY = 0;
            zoomValText.textContent = "100%";
            zoomOverlay.classList.add('hidden');
            applyZoomTransform();
        }

        zoomSlider.addEventListener('input', (e) => {
            currentScale = parseFloat(e.target.value);
            zoomValText.textContent = Math.round(currentScale * 100) + "%";
            
            if (currentScale > 1) {
                zoomOverlay.classList.remove('hidden');
            } else {
                zoomOverlay.classList.add('hidden');
                translateX = 0;
                translateY = 0;
            }
            applyZoomTransform();
        });

        // Mouse ile Kaydırma (Pan)
        zoomOverlay.addEventListener('mousedown', (e) => {
            if (currentScale > 1) {
                isPanning = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                zoomOverlay.classList.replace('cursor-grab', 'cursor-grabbing');
            }
        });

        window.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                zoomOverlay.classList.replace('cursor-grabbing', 'cursor-grab');
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning || currentScale <= 1) return;
            e.preventDefault();
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            applyZoomTransform();
        });

        // Dokunmatik Ekranlar için Kaydırma (Mobile Pan)
        zoomOverlay.addEventListener('touchstart', (e) => {
            if (currentScale > 1 && e.touches.length === 1) {
                isPanning = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            }
        });

        window.addEventListener('touchend', () => {
            isPanning = false;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isPanning || currentScale <= 1) return;
            if (e.touches.length === 1) {
                e.preventDefault();
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                applyZoomTransform();
            }
        }, { passive: false });

    </script>
</body>
</html>
